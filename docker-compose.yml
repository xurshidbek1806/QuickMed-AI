services:
  app:
    build: .
    container_name: quickmedai-app
    restart: unless-stopped
    volumes:
      - ./:/var/www
    networks:
      - xurshid

  nginx:
    image: nginx:alpine
    container_name: quickmedai-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - xurshid

networks:
  xurshid:
    external: true
